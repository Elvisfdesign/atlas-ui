<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<script>
  // The default Storybook <title> is emitted before this file's contents
  // are injected, and per the HTML spec the *first* <title> element wins —
  // simply adding another <title> tag here is silently ignored by
  // browsers. Setting document.title directly always takes effect.
  document.title = 'Atlas UI';
</script>
